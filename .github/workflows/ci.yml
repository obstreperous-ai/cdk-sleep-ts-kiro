name: CI

on:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm test -- --coverage

      - run: npx cdk synth --context environment=dev

      - name: Run CDK diff
        id: cdk-diff
        continue-on-error: true
        run: npx cdk diff --context environment=dev

      - name: Report CDK diff failure
        if: steps.cdk-diff.outcome == 'failure'
        run: |
          echo "::warning::CDK diff failed. This step is non-blocking, but the failure has been surfaced for review."
          echo "### CDK diff warning" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`npx cdk diff\` failed during CI. This does not block the workflow, but it indicates the diff was not successfully produced." >> "$GITHUB_STEP_SUMMARY"
